<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alien Translator 👽</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f1a;
      --surface: #161928;
      --border: #2a2f4a;
      --accent: #7c6af7;
      --accent2: #4ecdc4;
      --text: #e8eaf6;
      --muted: #7b82a8;
      --pill-bg: #1e2236;
      --radius: 14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 6px;
    }

    .wrap { width: 100%; max-width: 640px; }

    .dir-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px;
    }
    .dir-btn {
      flex: 1;
      padding: 9px;
      border: none;
      background: transparent;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.2s;
      font-weight: 500;
    }
    .dir-btn.active {
      background: linear-gradient(135deg, var(--accent), #5b52d4);
      color: #fff;
      box-shadow: 0 2px 10px rgba(124,106,247,0.4);
    }

    .box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.3rem;
      margin-bottom: 0.75rem;
      transition: border-color 0.2s;
    }
    .box:focus-within { border-color: var(--accent); }

    .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 10px;
      font-weight: 600;
    }

    textarea {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      font-size: 16px;
      color: var(--text);
      resize: none;
      font-family: inherit;
      line-height: 1.6;
    }
    textarea::placeholder { color: var(--muted); }

    .arrow {
      text-align: center;
      font-size: 22px;
      color: var(--accent);
      margin: 0.25rem 0;
      opacity: 0.7;
    }

    .output-text {
      font-size: 16px;
      color: var(--accent2);
      min-height: 64px;
      line-height: 1.6;
      white-space: pre-wrap;
      font-style: italic;
    }
    .output-text.empty { color: var(--muted); font-style: normal; }

    .status {
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
      min-height: 16px;
    }

    .translate-btn {
      width: 100%;
      padding: 12px;
      border: none;
      background: linear-gradient(135deg, var(--accent), #5b52d4);
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      color: #fff;
      margin-top: 0.25rem;
      transition: opacity 0.15s, transform 0.1s;
      box-shadow: 0 4px 15px rgba(124,106,247,0.3);
      letter-spacing: 0.02em;
    }
    .translate-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .translate-btn:active { transform: translateY(0); }

    .unknown-banner {
      margin-top: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.9rem 1.1rem;
      font-size: 13px;
      color: var(--muted);
      display: none;
    }
    .unknown-banner strong { color: var(--text); }
    .unk-words { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 5px; }
    .unk-pill {
      display: inline-block;
      font-size: 12px;
      background: var(--pill-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2px 10px;
      color: #f9a8d4;
    }

    footer {
      margin-top: 3rem;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <h1>Alien Translator</h1>
  <p>Translate between English and funny alien</p>
</header>

<div class="wrap">
  <div class="dir-toggle">
    <button class="dir-btn active" id="btn-en">English → Alien</button>
    <button class="dir-btn" id="btn-al">Alien → English</button>
  </div>

  <div class="box">
    <div class="label" id="input-label">Type in English</div>
    <textarea id="input-area" rows="4" placeholder="e.g. I want to go to the park with my friend"></textarea>
  </div>

  <div class="arrow">↓</div>

  <div class="box">
    <div class="label" id="output-label">Alien translation</div>
    <div class="output-text empty" id="output-area">Your translation will appear here...</div>
    <div class="status" id="status"></div>
  </div>

  <button class="translate-btn" id="translate-btn">Translate ✨</button>

  <div class="unknown-banner" id="unknown-banner">
    <strong>🤔 Unknown words (kept as-is):</strong>
    <div class="unk-words" id="unk-words-list"></div>
  </div>
</div>

<footer>Made with zib zub</footer>

const BASE_REVERSE = {};
for (const [en, al] of Object.entries(BASE_DICT)) BASE_REVERSE[al] = en;

let mode = "en2al";

function tokenize(text) {
  return text.toLowerCase().match(/[a-z']+|[^a-z'\s]+|\s+/gi) || [];
}

function translateTokens(tokens, forward) {
  const dict = forward ? BASE_DICT : BASE_REVERSE;
  const sortedKeys = Object.keys(dict).sort((a, b) => b.split(/\s+/).length - a.split(/\s+/).length || b.length - a.length);
  let text = tokens.join("");
  const lower = text.toLowerCase();
  let result = lower;
  const phs = {};
  let pi = 0;
  for (const key of sortedKeys) {
    const ph = `\u00A7${pi}\u00A7`;
    const esc = key.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp(`\\b${esc}\\b`, 'gi');
    if (re.test(result)) {
      phs[ph] = dict[key];
      result = result.replace(re, ph);
      pi++;
    }
  }
  for (const [ph, val] of Object.entries(phs)) result = result.replaceAll(ph, val);
  return result;
}

function findUnknownWords(text, forward) {
  const dict = forward ? BASE_DICT : BASE_REVERSE;
  const sortedKeys = Object.keys(dict).sort((a, b) => b.split(/\s+/).length - a.split(/\s+/).length);
  let remaining = text.toLowerCase();
  for (const key of sortedKeys) {
    const esc = key.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    remaining = remaining.replace(new RegExp(`\\b${esc}\\b`, 'gi'), " ");
  }
  return [...new Set((remaining.match(/[a-z']+/gi) || []).filter(w => w.length > 1))];
}

function doTranslate() {
  const input = document.getElementById("input-area").value.trim();
  if (!input) return;
  const output = document.getElementById("output-area");
  const status = document.getElementById("status");
  const banner = document.getElementById("unknown-banner");
  const unkList = document.getElementById("unk-words-list");
  const forward = mode === "en2al";

  const result = translateTokens(tokenize(input), forward);
  output.textContent = result;
  output.classList.remove("empty");

  const unknown = findUnknownWords(input, forward);
  if (unknown.length > 0) {
    banner.style.display = "block";
    unkList.innerHTML = unknown.map(w => `<span class="unk-pill">${w}</span>`).join("");
    status.textContent = `${unknown.length} word(s) not in the alien dictionary — kept as-is`;
  } else {
    banner.style.display = "none";
    status.textContent = "✓ Full translation!";
  }
}

document.getElementById("translate-btn").addEventListener("click", doTranslate);
document.getElementById("input-area").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); doTranslate(); }
});

function setMode(m) {
  mode = m;
  const isEN = m === "en2al";
  document.getElementById("btn-en").classList.toggle("active", isEN);
  document.getElementById("btn-al").classList.toggle("active", !isEN);
  document.getElementById("input-label").textContent = isEN ? "Type in English" : "Type in Alien";
  document.getElementById("output-label").textContent = isEN ? "Alien translation" : "English translation";
  document.getElementById("input-area").placeholder = isEN
    ? "e.g. I want to go to the park with my friend"
    : "e.g. zap zup vip vop, zib nib zap vroom zib";
  document.getElementById("input-area").value = "";
  document.getElementById("output-area").textContent = "Your translation will appear here...";
  document.getElementById("output-area").classList.add("empty");
  document.getElementById("status").textContent = "";
  document.getElementById("unknown-banner").style.display = "none";
}

document.getElementById("btn-en").addEventListener("click", () => setMode("en2al"));
document.getElementById("btn-al").addEventListener("click", () => setMode("al2en"));
